<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Client Manager — Vantage Admin</title>
  <link rel="stylesheet" href="../css/styles.css">
  <style>
    body{background:var(--gray-50);font-family:var(--font)}
    .page-wrap{max-width:1200px;margin:0 auto;padding:24px}
    .topbar-simple{background:var(--navy);padding:0 28px;height:56px;display:flex;align-items:center;justify-content:space-between}
    .topbar-simple a{color:rgba(255,255,255,.7);font-size:13px;text-decoration:none}
    .topbar-simple a:hover{color:#fff}
    .topbar-title{color:#fff;font-size:16px;font-weight:700}

    /* Layout */
    .cm-grid{display:grid;grid-template-columns:320px 1fr;gap:20px;margin-top:24px}
    .client-list-panel{background:#fff;border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden}
    .panel-head{background:var(--navy);color:#fff;padding:12px 16px;font-size:13px;font-weight:700;display:flex;align-items:center;justify-content:space-between}
    .client-list-item{padding:12px 16px;border-bottom:1px solid var(--border);cursor:pointer;transition:.15s}
    .client-list-item:hover{background:var(--navy-l)}
    .client-list-item.active{background:var(--navy-l);border-left:3px solid var(--gold)}
    .cli-name{font-size:13px;font-weight:600;color:var(--navy)}
    .cli-meta{font-size:11px;color:var(--gray-600);margin-top:2px}
    .cli-status{float:right;margin-top:2px}

    /* Detail panel */
    .detail-panel{background:#fff;border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden}
    .detail-tabs{display:flex;border-bottom:1px solid var(--border);background:var(--gray-50)}
    .dtab{padding:11px 20px;font-size:13px;font-weight:500;cursor:pointer;border-bottom:2px solid transparent;transition:.15s;color:var(--gray-600)}
    .dtab.active{color:var(--navy);border-bottom-color:var(--gold);font-weight:700}
    .dtab-content{display:none;padding:20px}
    .dtab-content.active{display:block}

    /* Agreement editor */
    .agr-editor-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
    .agr-field{margin-bottom:12px}
    .agr-field label{font-size:11px;color:var(--gray-600);display:block;margin-bottom:3px;font-weight:500}
    .agr-field input,.agr-field select,.agr-field textarea{width:100%;padding:7px 10px;border:1px solid var(--border);border-radius:var(--radius);font-size:13px;font-family:var(--font);color:var(--gray-800)}
    .agr-field input:focus,.agr-field select:focus,.agr-field textarea:focus{outline:none;border-color:var(--navy)}
    .agr-field textarea{min-height:60px;resize:vertical}
    .agr-preview{background:var(--gray-50);border:1px solid var(--border);border-radius:var(--radius);padding:16px;font-size:12px;line-height:1.8;color:var(--gray-600);max-height:400px;overflow-y:auto}
    .agr-preview h4{font-size:12px;font-weight:700;color:var(--gray-800);margin:10px 0 3px}
    .agr-preview h4:first-child{margin-top:0}
    .agr-field-filled{background:#fffde7}
    .status-dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:4px}
    .status-dot.pending{background:var(--orange)}
    .status-dot.signed{background:var(--green)}
    .status-dot.ready{background:var(--navy)}

    /* Doc upload review */
    .doc-review-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border)}
    .doc-review-row:last-child{border-bottom:none}
    .doc-review-name{flex:1;font-size:13px}
    .doc-review-status{font-size:11px;font-weight:600}

    /* Send to client */
    .send-banner{background:linear-gradient(135deg,var(--navy),#243f6a);border-radius:var(--radius-lg);padding:16px 20px;color:#fff;display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
    .send-banner-text h3{font-size:15px;font-weight:700}
    .send-banner-text p{font-size:12px;color:rgba(255,255,255,.75);margin-top:3px}

    .new-client-form{padding:20px}
    @media(max-width:900px){.cm-grid{grid-template-columns:1fr}.agr-editor-grid{grid-template-columns:1fr}}
  </style>
</head>
<body>

<div class="topbar-simple">
  <div class="topbar-title">👥 Client Manager — Staff Portal</div>
  <div style="display:flex;gap:16px">
    <a href="index.html">← Admin Panel</a>
    <a href="audit.html">🔍 Audit</a>
  </div>
</div>

<div class="page-wrap">
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px">
    <div>
      <div style="font-size:20px;font-weight:700;color:var(--navy)">Client Manager</div>
      <div style="font-size:13px;color:var(--gray-600)">Generate agreements, review documents, push updates to client portal</div>
    </div>
    <button class="btn btn-primary" onclick="showNewClientForm()">+ New Client</button>
  </div>

  <div id="newClientFormWrap" style="display:none;margin-top:16px">
    <div class="card">
      <div class="card-title">Add New Client</div>
      <div class="new-client-form" style="padding:0">
        <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px">
          <div class="agr-field"><label>First Name *</label><input id="nc_first" placeholder="First name"></div>
          <div class="agr-field"><label>Last Name *</label><input id="nc_last" placeholder="Last name"></div>
          <div class="agr-field"><label>Date of Birth</label><input type="date" id="nc_dob"></div>
          <div class="agr-field"><label>Email *</label><input type="email" id="nc_email" placeholder="client@email.com"></div>
          <div class="agr-field"><label>Phone</label><input id="nc_phone" placeholder="+1 780..."></div>
          <div class="agr-field"><label>Passport #</label><input id="nc_passport" placeholder="AB123456"></div>
          <div class="agr-field"><label>Country of Citizenship</label><input id="nc_country" placeholder="Eritrea"></div>
          <div class="agr-field"><label>Address in Canada</label><input id="nc_addr" placeholder="Street, City, Province"></div>
          <div class="agr-field"><label>Application Type *</label>
            <select id="nc_appType">
              <option value="">— Select —</option>
              <option value="spousal_spouses">Spousal Sponsorship — Spouses</option>
              <option value="spousal_commonlaw">Spousal Sponsorship — Common-Law</option>
              <option value="express_entry">Express Entry PR</option>
              <option value="work_permit_overseas">Work Permit — Overseas</option>
              <option value="work_permit_extension">Work Permit Extension</option>
              <option value="study_permit_overseas">Study Permit — Overseas</option>
              <option value="study_permit_extension">Study Permit Extension</option>
              <option value="trv_supervisa">TRV / Super Visa</option>
              <option value="visitor_extension">Visitor Record Extension</option>
              <option value="pr_card_renewal">PR Card Renewal</option>
            </select>
          </div>
        </div>
        <div class="btn-group">
          <button class="btn btn-primary" onclick="createClient()">Create Client File</button>
          <button class="btn" onclick="document.getElementById('newClientFormWrap').style.display='none'">Cancel</button>
        </div>
      </div>
    </div>
  </div>

  <div class="cm-grid" id="cmGrid">
    <!-- Client list -->
    <div class="client-list-panel">
      <div class="panel-head">
        <span>Clients</span>
        <span id="clientCount" style="font-size:11px;opacity:.7">0 clients</span>
      </div>
      <div id="clientListEl">
        <div style="padding:24px;text-align:center;color:var(--gray-400);font-size:13px">
          No clients yet.<br>Click "+ New Client" to add one.
        </div>
      </div>
    </div>

    <!-- Detail panel -->
    <div class="detail-panel" id="detailPanel">
      <div style="padding:48px;text-align:center;color:var(--gray-400)">
        <div style="font-size:40px;margin-bottom:12px">👤</div>
        <div style="font-size:15px;font-weight:600">Select a client to manage</div>
        <div style="font-size:13px;margin-top:6px">Edit agreements, review documents, push to portal</div>
      </div>
    </div>
  </div>
</div>

<script src="../shared/js/agreements.js"></script>
<script>

let selectedFileId = null;

// ── INIT ─────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  renderClientList();
  // Load any demo/intake clients
  seedDemoClients();
});

function seedDemoClients() {
  // Create demo client from intake session if present
  if (!getAllClients().length) {
    const demos = [
      { fileId:'VIS-2026-AB-TH-001', fullName:'Tesfaye Haile', first:'Tesfaye', last:'Haile',
        email:'tesfaye@demo.com', phone:'+1 780 555 0001', dob:'1988-04-12',
        passport:'ER123456', country:'Eritrea', appType:'spousal_spouses',
        appTypeLabel:'Spousal Sponsorship — Spouses', address:'123 Franklin Ave, Fort McMurray, AB',
        totalFee:'$2,350 CAD', stage1Fee:'$587 CAD — Due on signing',
        stage2Fee:'$1,763 CAD — Due at IRCC submission',
        consultFee:'$150 CAD', purpose:'Initial assessment and application for Spousal Sponsorship — Spouses',
        date: new Date().toLocaleDateString('en-CA'), ...COMPANY_DEFAULTS,
        consultReady:true, serviceReady:false, consultSigned:false, serviceSigned:false,
        staffNotes:'Client walked in Apr 7. Spouse is in Eritrea. Marriage cert obtained.' }
    ];
    demos.forEach(d => saveClientData(d.fileId, d));
  }
}

// ── CLIENT LIST ────────────────────────────────────────────────────
function renderClientList() {
  const clients = getAllClients();
  const el = document.getElementById('clientListEl');
  document.getElementById('clientCount').textContent = clients.length + ' client' + (clients.length!==1?'s':'');

  if (!clients.length) {
    el.innerHTML = '<div style="padding:24px;text-align:center;color:var(--gray-400);font-size:13px">No clients yet.</div>';
    return;
  }

  el.innerHTML = clients.map(c => {
    const cSigned = c.consultSigned ? '✓' : (c.consultReady ? '⏳' : '—');
    const sSigned = c.serviceSigned ? '✓' : (c.serviceReady ? '⏳' : '—');
    return `<div class="client-list-item ${selectedFileId===c.fileId?'active':''}" onclick="selectClient('${c.fileId}')">
      <div class="cli-name">${c.fullName || c.fileId}
        <span class="cli-status">
          <span class="badge ${c.consultSigned?'badge-green':c.consultReady?'badge-blue':'badge-gray'}" style="font-size:9px">C:${cSigned}</span>
          <span class="badge ${c.serviceSigned?'badge-green':c.serviceReady?'badge-blue':'badge-gray'}" style="font-size:9px;margin-left:2px">S:${sSigned}</span>
        </span>
      </div>
      <div class="cli-meta">${c.fileId} · ${c.appTypeLabel||c.appType||'—'}</div>
    </div>`;
  }).join('');
}

// ── SELECT CLIENT ──────────────────────────────────────────────────
function selectClient(fileId) {
  selectedFileId = fileId;
  renderClientList();
  const data = loadClientData(fileId);
  renderDetailPanel(data);
}

function renderDetailPanel(data) {
  const el = document.getElementById('detailPanel');
  el.innerHTML = `
    <div class="panel-head" style="background:var(--navy);padding:16px 20px">
      <div>
        <div style="font-size:16px;font-weight:700;color:#fff">${data.fullName || data.fileId}</div>
        <div style="font-size:11px;color:rgba(255,255,255,.6)">${data.fileId} · ${data.appTypeLabel||''}</div>
      </div>
      <div style="display:flex;gap:8px">
        <button class="btn btn-sm" style="background:rgba(255,255,255,.15);color:#fff;border-color:rgba(255,255,255,.3)" onclick="pushToPortal()">📤 Push to Portal</button>
        <button class="btn btn-sm" style="background:var(--gold);color:#fff;border-color:var(--gold)" onclick="saveAndRefresh()">💾 Save</button>
      </div>
    </div>

    <!-- SEND BANNER -->
    <div style="padding:16px 20px 0">
      <div class="send-banner">
        <div class="send-banner-text">
          <h3>Staff → Client Portal Sync</h3>
          <p>Fill in the fields below, click "Push to Portal" — client sees updated agreements instantly on next login.</p>
        </div>
        <div style="text-align:right">
          <div style="font-size:11px;color:rgba(255,255,255,.6)">Consult ready</div>
          <label style="display:flex;align-items:center;gap:6px;cursor:pointer;color:#fff;font-size:13px;margin-bottom:8px">
            <input type="checkbox" id="sf_consultReady" ${data.consultReady?'checked':''} style="accent-color:var(--gold)"> Send to client
          </label>
          <div style="font-size:11px;color:rgba(255,255,255,.6)">Service ready</div>
          <label style="display:flex;align-items:center;gap:6px;cursor:pointer;color:#fff;font-size:13px">
            <input type="checkbox" id="sf_serviceReady" ${data.serviceReady?'checked':''} style="accent-color:var(--gold)"> Send to client
          </label>
        </div>
      </div>
    </div>

    <!-- TABS -->
    <div class="detail-tabs">
      <div class="dtab active" id="dtab-consult" onclick="switchTab('consult')">📋 Consultation Agreement</div>
      <div class="dtab" id="dtab-service" onclick="switchTab('service')">✍ Service Agreement</div>
      <div class="dtab" id="dtab-docs" onclick="switchTab('docs')">📁 Documents</div>
      <div class="dtab" id="dtab-notes" onclick="switchTab('notes')">📝 Staff Notes</div>
    </div>

    <!-- TAB: CONSULTATION AGREEMENT -->
    <div class="dtab-content active" id="dtab-content-consult">
      <div style="display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap">
        <span class="badge ${data.consultSigned?'badge-green':'badge-orange'}">${data.consultSigned?'✓ Signed by client':'Awaiting client signature'}</span>
        ${data.consultReady?'<span class="badge badge-blue">Sent to client</span>':''}
      </div>
      <div class="agr-editor-grid">
        <div>
          <div style="font-size:12px;font-weight:700;color:var(--navy);margin-bottom:10px;text-transform:uppercase;letter-spacing:.04em">Edit Fields</div>
          ${renderAgrFields('ca', AGR_FIELDS.CONSULT, data)}
        </div>
        <div>
          <div style="font-size:12px;font-weight:700;color:var(--navy);margin-bottom:10px;text-transform:uppercase;letter-spacing:.04em">Live Preview</div>
          <div class="agr-preview" id="ca_preview">${buildConsultPreview(data)}</div>
          <div class="btn-group">
            <button class="btn btn-sm btn-primary" onclick="saveAndRefresh()">Update Preview</button>
            <button class="btn btn-sm" onclick="printAgreement('consult')">🖨 Print / PDF</button>
          </div>
        </div>
      </div>
    </div>

    <!-- TAB: SERVICE AGREEMENT -->
    <div class="dtab-content" id="dtab-content-service">
      <div style="display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap">
        <span class="badge ${data.serviceSigned?'badge-green':'badge-orange'}">${data.serviceSigned?'✓ Signed by client':'Awaiting client signature'}</span>
        ${data.serviceReady?'<span class="badge badge-blue">Sent to client</span>':''}
      </div>
      <div class="agr-editor-grid">
        <div>
          <div style="font-size:12px;font-weight:700;color:var(--navy);margin-bottom:10px;text-transform:uppercase;letter-spacing:.04em">Edit Fields</div>
          ${renderAgrFields('sa', AGR_FIELDS.SERVICE, data)}
        </div>
        <div>
          <div style="font-size:12px;font-weight:700;color:var(--navy);margin-bottom:10px;text-transform:uppercase;letter-spacing:.04em">Live Preview</div>
          <div class="agr-preview" id="sa_preview">${buildServicePreview(data)}</div>
          <div class="btn-group">
            <button class="btn btn-sm btn-primary" onclick="saveAndRefresh()">Update Preview</button>
            <button class="btn btn-sm" onclick="printAgreement('service')">🖨 Print / PDF</button>
          </div>
        </div>
      </div>
    </div>

    <!-- TAB: DOCUMENTS -->
    <div class="dtab-content" id="dtab-content-docs">
      <div style="font-size:13px;color:var(--gray-600);margin-bottom:14px">Documents uploaded by the client appear here. Review and mark as accepted or request re-upload.</div>
      <div id="docReviewList">${buildDocReview(data)}</div>
    </div>

    <!-- TAB: NOTES -->
    <div class="dtab-content" id="dtab-content-notes">
      <div class="agr-field">
        <label>Internal Staff Notes (not visible to client)</label>
        <textarea id="sf_staffNotes" style="min-height:200px">${data.staffNotes||''}</textarea>
      </div>
      <div class="agr-field">
        <label>Message to Client (will appear in their Messages tab)</label>
        <textarea id="sf_clientMsg" placeholder="Type a message to send to the client..." style="min-height:100px"></textarea>
      </div>
      <div class="btn-group">
        <button class="btn btn-primary" onclick="saveAndPushMessage()">Save Notes &amp; Send Message to Client</button>
      </div>
    </div>`;
}

function renderAgrFields(prefix, fields, data) {
  return fields.map(f => `
    <div class="agr-field">
      <label>${f.label}</label>
      <input id="sf_${f.id}" value="${(data[f.key]||f.default||'').replace(/"/g,'&quot;')}" oninput="livePreview()" class="${data[f.key]?'agr-field-filled':''}">
    </div>`).join('');
}

function buildConsultPreview(d) {
  return `<h4>Consultation Agreement</h4>
<p><strong>Date:</strong> ${d.date||'—'} &nbsp;|&nbsp; <strong>File:</strong> ${d.fileId||'—'}</p>
<p><strong>RCIC:</strong> ${d.rcic_name||'—'} (CICC # ${d.rcic_cicc||'—'})<br>
${d.rcic_addr||''} &nbsp; ${d.rcic_phone||''} &nbsp; ${d.rcic_email||''}</p>
<p><strong>Client:</strong> ${d.fullName||'—'}<br>
DOB: ${d.dob||'—'} &nbsp; Phone: ${d.phone||'—'} &nbsp; Email: ${d.email||'—'}<br>
Address: ${d.address||'—'}</p>
<p><strong>Purpose:</strong> ${d.purpose||'—'}</p>
<p><strong>Consultation Fee:</strong> ${d.consultFee||'—'}</p>
<h4>1. Purpose and Scope</h4><p>One-time initial consultation. No application preparation included.</p>
<h4>2. No Guarantee</h4><p>No guarantee of eligibility, approval, or processing times.</p>
<h4>3. Confidentiality (CICC Code s.28)</h4><p>All information kept strictly confidential.</p>
<h4>4. Privacy (PIPEDA / PIPA Alberta)</h4><p>Client consents to data collection for immigration consulting.</p>`;
}

function buildServicePreview(d) {
  return `<h4>Retainer / Service Agreement</h4>
<p><strong>Date:</strong> ${d.date||'—'} &nbsp;|&nbsp; <strong>File:</strong> ${d.fileId||'—'}</p>
<p><strong>Consultant:</strong> ${d.rcic_name||'—'} (CICC # ${d.rcic_cicc||'—'})<br>
${d.rcic_addr||''} &nbsp; ${d.rcic_phone||''}</p>
<p><strong>Client:</strong> ${d.fullName||'—'} &nbsp; Passport: ${d.passport||'—'}<br>
${d.address||'—'} &nbsp; ${d.phone||'—'}</p>
<p><strong>Application Type:</strong> ${d.appTypeLabel||'—'}</p>
<p><strong>Total Professional Fee:</strong> ${d.totalFee||'—'}<br>
Stage 1 (on signing): ${d.stage1Fee||'—'}<br>
Stage 2 (at submission): ${d.stage2Fee||'—'}</p>
<h4>1. Authorization</h4><p>Client retains Vantage Immigration Services as RCIC representative.</p>
<h4>2. 48-Hour Cooling-Off Period</h4><p>Full refund if cancelled within 48 hours of signing.</p>
<h4>3. Fees &amp; Trust Account</h4><p>Advance payments held in trust. Government fees separate.</p>
<h4>4. Misrepresentation Warning</h4><p>False information may lead to refusal and future ineligibility.</p>
<h4>5. Dispute Resolution</h4><p>CICC: 1-877-836-7543 — college-ic.ca</p>`;
}

function buildDocReview(data) {
  const appType = data.appType || 'spousal_spouses';
  const cl = CLIENT_CHECKLISTS[appType];
  if (!cl) return '<p class="text-muted">No checklist for this application type.</p>';
  const docs = data.uploadedDocs || {};
  let html = '';
  cl.sections.forEach(sec => {
    html += `<div style="font-size:11px;font-weight:700;text-transform:uppercase;color:var(--navy);letter-spacing:.06em;margin:14px 0 6px">${sec.name}</div>`;
    sec.items.forEach((item,i) => {
      const key = sec.name+'_'+i;
      const status = docs[key] || 'pending';
      html += `<div class="doc-review-row">
        <div class="doc-review-name">${item.en} ${item.required?'<span style="color:var(--red);font-size:10px">*</span>':''}</div>
        <select style="width:130px;font-size:11px;padding:3px 6px" onchange="updateDocStatus('${key}',this.value)">
          <option value="pending" ${status==='pending'?'selected':''}>⏳ Pending</option>
          <option value="received" ${status==='received'?'selected':''}>📥 Received</option>
          <option value="accepted" ${status==='accepted'?'selected':''}>✅ Accepted</option>
          <option value="reupload" ${status==='reupload'?'selected':''}>🔄 Re-upload</option>
        </select>
      </div>`;
    });
  });
  return html;
}

// ── TABS ──────────────────────────────────────────────────────────
function switchTab(id) {
  document.querySelectorAll('.dtab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.dtab-content').forEach(t => t.classList.remove('active'));
  document.getElementById('dtab-'+id)?.classList.add('active');
  document.getElementById('dtab-content-'+id)?.classList.add('active');
}

// ── LIVE PREVIEW ──────────────────────────────────────────────────
function livePreview() {
  const data = collectFormData();
  const caPrev = document.getElementById('ca_preview');
  const saPrev = document.getElementById('sa_preview');
  if (caPrev) caPrev.innerHTML = buildConsultPreview(data);
  if (saPrev) saPrev.innerHTML = buildServicePreview(data);
}

function collectFormData() {
  const existing = loadClientData(selectedFileId);
  const collected = { ...existing };

  // Collect all sf_ fields
  document.querySelectorAll('[id^="sf_"]').forEach(el => {
    const key = el.id.replace('sf_', '');
    if (el.type === 'checkbox') collected[key] = el.checked;
    else collected[key] = el.value;
  });

  // Map agreement field IDs back to data keys
  [...AGR_FIELDS.CONSULT, ...AGR_FIELDS.SERVICE].forEach(f => {
    const el = document.getElementById('sf_' + f.id);
    if (el) collected[f.key] = el.value;
  });

  return collected;
}

// ── SAVE ──────────────────────────────────────────────────────────
function saveAndRefresh() {
  if (!selectedFileId) return;
  const data = collectFormData();
  saveClientData(selectedFileId, data);
  renderClientList();
  livePreview();
  showToast('Saved ✓');
}

function pushToPortal() {
  if (!selectedFileId) return;
  const data = collectFormData();
  saveClientData(selectedFileId, data);
  renderClientList();
  showToast('✓ Pushed to client portal — client will see updates on next login');
}

function saveAndPushMessage() {
  if (!selectedFileId) return;
  const data = collectFormData();
  const msg = document.getElementById('sf_clientMsg')?.value?.trim();
  if (msg) {
    const msgs = data.staffMessages || [];
    msgs.push({ text: msg, time: new Date().toLocaleString(), from: 'Vantage Immigration' });
    data.staffMessages = msgs;
    document.getElementById('sf_clientMsg').value = '';
  }
  saveClientData(selectedFileId, data);
  showToast('✓ Notes saved. Message sent to client portal.');
}

function updateDocStatus(key, val) {
  if (!selectedFileId) return;
  const data = loadClientData(selectedFileId);
  if (!data.uploadedDocs) data.uploadedDocs = {};
  data.uploadedDocs[key] = val;
  saveClientData(selectedFileId, data);
}

// ── CREATE CLIENT ─────────────────────────────────────────────────
function showNewClientForm() {
  const el = document.getElementById('newClientFormWrap');
  el.style.display = el.style.display === 'none' ? 'block' : 'none';
}

function createClient() {
  const first = document.getElementById('nc_first').value.trim();
  const last  = document.getElementById('nc_last').value.trim();
  const email = document.getElementById('nc_email').value.trim();
  const appType = document.getElementById('nc_appType').value;
  if (!first || !last || !email || !appType) { alert('Please fill in First Name, Last Name, Email, and Application Type.'); return; }

  const initials = (first[0]+last[0]).toUpperCase();
  const seq = String(Math.floor(Math.random()*900)+100);
  const fileId = `VIS-${new Date().getFullYear()}-AB-${initials}-${seq}`;
  const appTypeLabel = APP_TYPE_LABELS[appType] || appType;
  const fee = APP_FEES[appType] || 0;

  const data = {
    fileId, fullName: first+' '+last, first, last,
    email, phone: document.getElementById('nc_phone').value,
    dob: document.getElementById('nc_dob').value,
    passport: document.getElementById('nc_passport').value,
    country: document.getElementById('nc_country').value,
    address: document.getElementById('nc_addr').value,
    appType, appTypeLabel,
    purpose: `Initial assessment and application for ${appTypeLabel}`,
    consultFee: '$150 CAD',
    totalFee: fee ? `$${fee.toLocaleString()} CAD` : '',
    stage1Fee: fee ? `$${Math.round(fee*.25).toLocaleString()} CAD — Due on signing` : '',
    stage2Fee: fee ? `$${Math.round(fee*.75).toLocaleString()} CAD — Due at IRCC submission` : '',
    date: new Date().toLocaleDateString('en-CA'),
    ...COMPANY_DEFAULTS,
    consultReady: false, serviceReady: false,
    consultSigned: false, serviceSigned: false,
    staffNotes: '', staffMessages: []
  };

  saveClientData(fileId, data);
  document.getElementById('newClientFormWrap').style.display = 'none';
  renderClientList();
  selectClient(fileId);
  showToast(`✓ Client file created: ${fileId}`);
}

function printAgreement(type) {
  window.print();
}

function showToast(msg) {
  let t = document.getElementById('toast');
  if (!t) {
    t = document.createElement('div');
    t.id = 'toast';
    t.style.cssText = 'position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--navy);color:#fff;padding:10px 24px;border-radius:var(--radius-lg);font-size:13px;font-weight:600;z-index:999;box-shadow:0 4px 20px rgba(0,0,0,.2);transition:.3s';
    document.body.appendChild(t);
  }
  t.textContent = msg;
  t.style.opacity = '1';
  setTimeout(() => { t.style.opacity = '0'; }, 2500);
}
</script>
